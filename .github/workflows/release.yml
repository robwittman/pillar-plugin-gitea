name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Prepare module
        run: |
          go mod edit -dropreplace=github.com/robwittman/pillar
          go mod tidy

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BINARY="pillar-plugin-gitea"
          if [ "$GOOS" = "windows" ]; then
            BINARY="${BINARY}.exe"
          fi
          CGO_ENABLED=0 go build -ldflags="-s -w" -o "${BINARY}" .
          ASSET="pillar-plugin-gitea_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
          tar czf "${ASSET}" "${BINARY}"
          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" "$ASSET"
